name: generate_newsletter

on:
  schedule:
    - cron: '0 22 * * 0' # 07:00 KST Monday (every week)
  workflow_dispatch:

jobs:
  generate_newsletter:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_CLOUD_EMAIL: ${{ secrets.GOOGLE_CLOUD_EMAIL }}
      GOOGLE_CLOUD_SPREADSHEET_URL: ${{ secrets.GOOGLE_CLOUD_SPREADSHEET_URL }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Download past 7 days of football data from GCS
        run: |
          for i in $(seq 1 7); do
            DATE=$(date -d "-${i} days" +%Y%m%d)
            gcloud storage cp -r \
              gs://my-football-news/football-news/datas/fotmob/${DATE} \
              datas/fotmob/${DATE} || true
          done

      - name: Generate newsletter
        run: |
          python generate_newsletter.py

      - name: Upload newsletter to GCS
        run: |
          gcloud storage cp -r datas/newsletter/$(date +%Y%m%d) \
            gs://my-football-news/football-news/datas/newsletter/$(date +%Y%m%d)
